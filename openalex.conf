<VirtualHost *:80>
    ServerName openalex.colav.co
    Redirect permanent / https://openalex.colav.co/
RewriteEngine on
RewriteCond %{SERVER_NAME} =openalex.colav.co
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName openalex.colav.co

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket support (Next.js)
    ProxyPass /ws ws://localhost:3000/ws
    ProxyPassReverse /ws ws://localhost:3000/ws

    # Backend API
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api

    # Frontend (Next.js)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/openalex_error.log
    CustomLog ${APACHE_LOG_DIR}/openalex_access.log combined
Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/openalex.colav.co/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/openalex.colav.co/privkey.pem
</VirtualHost>
