<VirtualHost *:80>
    ServerName openalex.colav.co
    Redirect permanent / https://openalex.colav.co/
</VirtualHost>

<VirtualHost *:443>
    ServerName openalex.colav.co

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/openalex.colav.co/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/openalex.colav.co/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    # Backend API
    ProxyPass        /api  http://localhost:8000/api
    ProxyPassReverse /api  http://localhost:8000/api

    # Frontend (Next.js)
    ProxyPass        /  http://localhost:3000/
    ProxyPassReverse /  http://localhost:3000/

    # WebSocket support (Next.js HMR / streaming)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://localhost:3000/$1 [P,L]

    ErrorLog  ${APACHE_LOG_DIR}/openalex_error.log
    CustomLog ${APACHE_LOG_DIR}/openalex_access.log combined
</VirtualHost>
