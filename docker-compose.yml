version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - MONGO_URI=mongodb://localhost:27017
      - MONGO_DB=openalexco
      - AVAILABLE_DBS=openalexco:OpenAlex Colombia,openalex:OpenAlex Full
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://openalex.colav.co/api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://openalex.colav.co/api
    depends_on:
      - backend
    restart: unless-stopped
